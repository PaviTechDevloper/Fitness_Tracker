apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: pavithra-ns
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7-jammy
        command: ["/bin/bash", "-c"]
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "Triggering OOM...";
            i=0;
            while true; do
              dd if=/dev/zero of=/dev/shm/file_$i bs=10M count=10;
              i=$((i+1));
            done
        ports:
        - containerPort: 27017
        resources:
            limits:
              memory: "512Mi"
              cpu: "200m"
            requests:
              memory: "256Mi"
              cpu: "100m"
        volumeMounts:
          - name: fitness-volume
            mountPath: /data/db
      volumes:
        - name: fitness-volume
          emptyDir: 
            sizeLimit: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: pavithra-ns
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
 
 