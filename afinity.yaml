apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-affinity-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-affinity
  template:
    metadata:
      labels:
        app: nginx-affinity
    spec:
      affinity:

        # 🔹 Node Affinity (your existing one)
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: training
                operator: In
                values:
                - devops

        # 🔹 Pod Affinity (NEW)
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: backend   # 👈 target pod
            topologyKey: "kubernetes.io/hostname"

      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80