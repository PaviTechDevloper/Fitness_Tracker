name: Fitness Tracker CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    name: CI - Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test || true

    - name: Install Docker
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t "${{ secrets.DOCKER_USERNAME }}"/fitness-tracker:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:latest

    - name: Trivy install
      run: |
        sudo apt update 
        sudo apt install trivy -y
    
    - name: Trivy scan
      run: trivy image --severity HIGH,CRITICAL ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:latest