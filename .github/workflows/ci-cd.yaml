name: Fitness Tracker CI/CD

on:
  push:
    branches: ["master"]

env:
  IMAGE_NAME: fitness-tracker

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
    # 🔹 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔹 2. Debug (IMPORTANT - helps fix your error)
    - name: Debug Files
      run: |
        echo "Current directory:"
        pwd
        echo "Files:"
        ls -la

    # 🔹 3. Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # 🔹 4. Install Dependencies
    - name: Install Dependencies
      run: npm install

    # 🔹 5. Run Tests (optional safe)
    - name: Run Tests
      run: npm test || true

    # 🔹 6. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 7. Build Docker Image (FIXED)
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    # 🔹 8. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 🔹 9. Tag as latest (optional best practice)
    - name: Tag Latest
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
        ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest